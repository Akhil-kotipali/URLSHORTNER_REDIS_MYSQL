spring.application.name=urlShortner
spring.jpa.hibernate.ddl-auto=update

# Database properties (Overridden by Render Environment Variables)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/testdb}
spring.datasource.username=${DB_USER:Akhil}
spring.datasource.password=${DB_PASS:2170}

# Redis properties
spring.data.redis.host=${REDIS_HOST:127.0.0.1}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:2170}

# Base URL (Automatically maps to Render's live URL, or defaults to localhost)
app.base-url=${RENDER_EXTERNAL_URL:http://localhost:8080}

# TTL configuration (Admin can change this in Render Dashboard without changing code)
redis-ttl=${REDIS_TTL_HOURS:1}

# Actuator & Logging
management.endpoints.web.exposure.include=health,metrics,env
management.endpoint.health.show-details=always
logging.file.name=app.log
logging.level.org.springframework.web=INFO