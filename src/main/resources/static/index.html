<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JTRACE Shortener</title>
    <script>
        // Dynamically detect base URL so it works locally AND on Render
        const baseUrl = window.location.origin; 
        let pollInterval;

        window.onload = () => {
            const token = localStorage.getItem('jwt');
            const role = localStorage.getItem('role');
            if (token) showDashboard(role);
        };

        async function authenticate(action) {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const res = await fetch(`${baseUrl}/api/auth/${action}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const data = await res.json();
            if (res.ok) {
                if (action === 'login') {
                    localStorage.setItem('jwt', data.token);
                    localStorage.setItem('role', data.role);
                    showDashboard(data.role);
                } else {
                    document.getElementById('authMessage').innerText = "Registered! You can now login.";
                    document.getElementById('authMessage').className = "text-green-500 mt-4 text-center";
                }
            } else {
                document.getElementById('authMessage').innerText = data.error || "Authentication failed";
            }
        }

        function showDashboard(role) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('logoutBtn').classList.remove('hidden');
            document.getElementById('userDashboard').classList.remove('hidden');
            
            fetchMyLinks(); // Fetch the links immediately upon showing dashboard

            if (role === 'ROLE_ADMIN') {
                document.getElementById('adminDashboard').classList.remove('hidden');
                
                // Add Clear Cache button dynamically to admin view
                if(!document.getElementById('cacheBtn')) {
                    const cacheBtn = document.createElement('button');
                    cacheBtn.id = 'cacheBtn';
                    cacheBtn.innerText = "Flush Redis Cache";
                    cacheBtn.className = "bg-yellow-500 text-white px-4 py-2 rounded shadow hover:bg-yellow-600 mb-4 w-full font-bold";
                    cacheBtn.onclick = clearAdminCache;
                    document.getElementById('adminDashboard').prepend(cacheBtn);
                }

                startAdminPolling();
            }
        }

        function logout() {
            localStorage.clear();
            clearInterval(pollInterval);
            location.reload();
        }

        // NEW: Fetch and display links
        async function fetchMyLinks() {
            const token = localStorage.getItem('jwt');
            const res = await fetch(`${baseUrl}/api/urls/my-links`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.ok) {
                const links = await res.json();
                const container = document.querySelector('.p-4.bg-gray-50'); // The placeholder div
                
                if (links.length === 0) {
                    container.innerHTML = "No links created yet.";
                    return;
                }

                let tableHtml = `<table class="w-full text-left border-collapse bg-white shadow-sm">
                    <thead>
                        <tr class="bg-blue-100 text-blue-800">
                            <th class="p-3 border-b font-semibold">Short Link</th>
                            <th class="p-3 border-b font-semibold">Original Destination</th>
                        </tr>
                    </thead>
                    <tbody>`;
                
                links.forEach(link => {
                    const shortUrl = `${baseUrl}/${link.shortCode}`;
                    tableHtml += `
                        <tr class="hover:bg-gray-50 transition">
                            <td class="p-3 border-b">
                                <a href="${shortUrl}" target="_blank" class="text-blue-600 font-medium hover:underline">${shortUrl}</a>
                            </td>
                            <td class="p-3 border-b text-gray-600 truncate max-w-xs block" title="${link.longUrl}">
                                ${link.longUrl}
                            </td>
                        </tr>`;
                });
                
                tableHtml += `</tbody></table>`;
                container.innerHTML = tableHtml;
                container.classList.remove('text-center', 'text-gray-600', 'bg-gray-50'); // remove placeholder styling
            }
        }

        async function createShortLink() {
            const longUrl = document.getElementById('longUrlInput').value;
            const token = localStorage.getItem('jwt');

            const res = await fetch(`${baseUrl}/api/urls`, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ longUrl })
            });

            if(res.ok) {
                const data = await res.json();
                document.getElementById('linkResult').innerHTML = `Success! <a href="${data.shortUrl}" target="_blank" class="underline text-blue-500">${data.shortUrl}</a>`;
                document.getElementById('longUrlInput').value = ''; // clear input
                fetchMyLinks(); // Refresh the table immediately
            } else {
                alert("Failed to shorten URL. Ensure it is a valid format (e.g., https://google.com)");
            }
        }

        async function clearAdminCache() {
            const token = localStorage.getItem('jwt');
            const res = await fetch(`${baseUrl}/api/admin/clear-cache`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if(res.ok) alert("Redis Cache flushed successfully!");
        }

        // Admin Actuator Polling
        function startAdminPolling() {
            fetchAdminData(); 
            pollInterval = setInterval(fetchAdminData, 10000); 
        }

        async function fetchAdminData() {
            const token = localStorage.getItem('jwt');
            const headers = { 'Authorization': `Bearer ${token}` };

            fetch(`${baseUrl}/actuator/health`, { headers })
                .then(res => res.json())
                .then(data => document.getElementById('healthStatus').innerText = data.status);

            fetch(`${baseUrl}/actuator/metrics/jvm.memory.used`, { headers })
                .then(res => res.json())
                .then(data => {
                    const mb = (data.measurements[0].value / 1048576).toFixed(2);
                    document.getElementById('memoryStatus').innerText = `${mb} MB`;
                });

            fetch(`${baseUrl}/api/admin/logs`, { headers })
                .then(res => res.json())
                .then(data => document.getElementById('logOutput').innerText = data.join('\n'));
        }
    </script>
</body>
</html>
